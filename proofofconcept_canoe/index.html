<form id="canoeForm">

    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Your name">

    <label for="email">Email *</label>
    <input type="email" id="email" required>

    <label for="date">Select Rental Date *</label>
    <input type="text" id="date" placeholder="Choose a date" readonly>

    <label for="canoe-count">Number of Canoes *</label>
    <select id="canoe-count">
        <option value="">Select...</option>
        <option value="1">1 Canoe</option>
        <option value="2">2 Canoes</option>
        <option value="3">3 Canoes</option>
        <option value="4">4 Canoes</option>
        <option value="5">5 Canoes</option>
        <option value="6">6 Canoes</option>
        <option value="7">7 Canoes</option>
        <option value="8">8 Canoes</option>
        <option value="9">9 Canoes</option>
        <option value="10">10 Canoes</option>
    </select>

    <div id="liveTotal"></div>

    <button type="submit">Submit Request</button>

</form>

<div id="confirmationMessage"></div>
