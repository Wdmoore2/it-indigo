<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Rodman Comedy Tour - Contact Page" />
    <meta name="author" content="Will Moore" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rodman Comedy Tour - Contact</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="site-grid">
      <body class="contact-page"></body>

      <!-- HERO SECTION -->
      <header class="hero">
        <div class="hero-content container">
          <div class="hero-grid">
            <div class="hero-left">
              <!-- NAVIGATION -->
              <nav class="hero-nav">
                <ul class="nav-links">
                  <li><a href="index.html">Home</a></li>
                  <li><a href="index.html#about">About</a></li>
                  <li><a href="index.html#tour">Tour</a></li>
                  <li><a href="weather.html">Weather</a></li>
                  <li><a href="contact.html">Contact</a></li>
                </ul>
              </nav>

              <!-- HERO TEXT -->
              <div class="hero-text">
                <h1>Get in Touch with Rodman</h1>
              </div>
            </div>

            <div class="hero-image">
              <img src="assets/img/rodmancomedy.jpg" alt="Rodman" />
            </div>
          </div>
        </div>
      </header>

      <!-- CONTACT SECTION -->
      <section class="contact container">
        <div class="contact-card">
          <h2>Contact Rodman</h2>
          <form
            class="contact-form"
            id="contact-form"
            action="https://formspree.io/f/mjgabeed"
            method="POST"
          >
            <label>
              Your Email:
              <input type="email" name="email" required />
            </label>
            <label>
              Your Message:
              <textarea name="message" required></textarea>
            </label>
            <button type="submit">Send</button>
          </form>
        </div>
      </section>

      <!-- FOOTER -->
      <footer>
        <p class="credit">Website Designed & Developed by Will Moore</p>
      </footer>

    </div>

    <script src="assets/js/form.js"></script>
  </body>
</html>
